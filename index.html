<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>손글씨 숫자 인식 AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
    }
    h1 { font-size: 19px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.3px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 18px; }

    /* 카메라 / 결과 영역 */
    #camera-box {
      width: 300px;
      height: 300px;
      border-radius: 16px;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      overflow: hidden;
      position: relative;
      margin-bottom: 14px;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #captured-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #placeholder-text {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
      padding: 20px;
    }
    /* 정사각형 가이드 (교재 14장 방식: 이 안에 숫자를 꽉 채워서 촬영) */
    #guide-box {
      position: absolute;
      top: 14%; left: 14%; right: 14%; bottom: 14%;
      border: 3px solid #34C759;
      border-radius: 8px;
      pointer-events: none;
      display: none;
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.35);
    }
    #guide-box.visible { display: block; }
    #guide-label {
      position: absolute;
      top: -26px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #34C759;
      font-weight: 600;
      white-space: nowrap;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .btn-row { display: flex; gap: 10px; margin-bottom: 16px; width: 100%; max-width: 320px; }
    button {
      flex: 1; padding: 14px 10px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.35; }
    #btn-start { background: #007AFF; color: #fff; }
    #btn-shoot { background: #34C759; color: #fff; display: none; }
    #btn-retake { background: #2a2a2a; color: #ccc; font-size: 13px; }

    .toggle-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px; width: 100%; max-width: 320px;
    }
    .toggle-label { font-size: 13px; color: #999; flex: 1; }
    .toggle { position: relative; width: 44px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #3a3a3a; border-radius: 26px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider:before {
      content: ''; position: absolute; left: 3px; top: 3px;
      width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #007AFF; }
    .toggle input:checked + .slider:before { transform: translateX(18px); }

    #result-card {
      width: 100%; max-width: 320px; background: #1a1a1a;
      border-radius: 16px; padding: 20px; display: none;
    }
    #result-card.visible { display: block; }
    .result-digit { font-size: 68px; font-weight: 800; text-align: center; line-height: 1; margin-bottom: 4px; }
    .result-label { text-align: center; color: #888; font-size: 13px; margin-bottom: 16px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bar-digit { width: 14px; font-size: 13px; color: #888; text-align: right; }
    .bar-bg { flex: 1; height: 8px; background: #2a2a2a; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: #007AFF; transition: width 0.4s ease; }
    .bar-fill.top { background: #34C759; }
    .bar-pct { width: 38px; font-size: 12px; color: #666; text-align: right; }

    #status { font-size: 13px; color: #666; margin-bottom: 10px; min-height: 18px; text-align: center; }
    canvas { display: none; }
  </style>
</head>
<body>

<h1>✍️ 손글씨 숫자 인식</h1>
<p class="subtitle">MNIST CNN · TensorFlow.js · 온디바이스 AI</p>

<div id="camera-box">
  <video id="video" playsinline muted autoplay></video>
  <img id="captured-img" />
  <div id="placeholder-text">📷 시작하기를 눌러<br>카메라를 켜주세요</div>
  <div id="guide-box"><span id="guide-label">이 안에 숫자를 꽉 채워주세요</span></div>
</div>

<p id="status">모델 로딩 중...</p>
<div id="benchmark-result" style="margin-bottom: 15px; font-size: 15px; font-weight: bold; text-align: center;"></div>

<div class="btn-row">
  <button id="btn-start">📷 시작하기</button>
  <button id="btn-shoot" disabled>● 촬영</button>
  <button id="btn-retake" style="display:none;">다시 찍기</button>
</div>

<div class="toggle-row">
  <span class="toggle-label">흰 종이 + 검은 펜 (색반전 켜기)</span>
  <label class="toggle">
    <input type="checkbox" id="invert-toggle" checked>
    <span class="slider"></span>
  </label>
</div>

<div id="result-card">
  <div class="result-digit" id="result-digit">?</div>
  <div class="result-label" id="result-label">예측 결과</div>
  <div id="bars"></div>
</div>

<canvas id="canvas"></canvas>

<script>
// 교재(Mastering PyTorch Ch.14)와 동일한 MNIST 정규화 값
const MEAN = 0.1307;
const STD  = 0.3081;

let model = null;
let stream = null;
let lastCapturedCanvas = null;

const video = document.getElementById('video');
const capturedImg = document.getElementById('captured-img');
const placeholder = document.getElementById('placeholder-text');
const guideBox = document.getElementById('guide-box');
const btnStart = document.getElementById('btn-start');
const btnShoot = document.getElementById('btn-shoot');
const btnRetake = document.getElementById('btn-retake');
const statusEl = document.getElementById('status');

// 모델 로드
(async () => {
  try {
    model = await tf.loadLayersModel('model/model.json');
    statusEl.textContent = '✅ 모델 로드 완료 · 시작하기를 눌러주세요';
  } catch (e) {
    statusEl.textContent = '❌ 모델 로드 실패 · model/ 폴더 확인';
    console.error(e);
  }
})();

// 카메라 시작 (실시간 미리보기 + 가이드 박스 표시)
btnStart.addEventListener('click', async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    video.srcObject = stream;
    await video.play();

    video.style.display = 'block';
    capturedImg.style.display = 'none';
    placeholder.style.display = 'none';
    guideBox.classList.add('visible');
    btnStart.style.display = 'none';
    btnShoot.style.display = 'block';
    btnShoot.disabled = false;
    btnRetake.style.display = 'none';
    document.getElementById('result-card').classList.remove('visible');
    statusEl.textContent = '초록 네모 안에 숫자를 꽉 채워주세요';
    document.getElementById('benchmark-result').innerHTML = ''; // 시작 시 벤치마크 결과 초기화
  } catch (e) {
    statusEl.textContent = '❌ 카메라 접근 실패: ' + e.message;
  }
});

// 촬영: 비디오 프레임에서 "가이드 박스 영역만" 정사각형으로 잘라서 캡처
btnShoot.addEventListener('click', () => {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;

  const videoShortSide = Math.min(vw, vh);
  const displaySquare = videoShortSide; 
  const guideFraction = 0.72; 

  const cropSize = displaySquare * guideFraction;
  const cropX = (vw - displaySquare) / 2 + (displaySquare - cropSize) / 2;
  const cropY = (vh - displaySquare) / 2 + (displaySquare - cropSize) / 2;

  const canvas = document.getElementById('canvas');
  canvas.width = vw; canvas.height = vh;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, vw, vh);

  const squareCanvas = document.createElement('canvas');
  squareCanvas.width = 300; squareCanvas.height = 300;
  const sctx = squareCanvas.getContext('2d');
  sctx.drawImage(canvas, cropX, cropY, cropSize, cropSize, 0, 0, 300, 300);
  lastCapturedCanvas = squareCanvas;

  capturedImg.src = squareCanvas.toDataURL('image/jpeg', 0.92);
  capturedImg.style.display = 'block';
  video.style.display = 'none';
  guideBox.classList.remove('visible');
  btnShoot.style.display = 'none';
  btnRetake.style.display = 'block';

  stopCamera();
  runInference(squareCanvas);
});

btnRetake.addEventListener('click', () => {
  btnStart.style.display = 'block';
  btnRetake.style.display = 'none';
  capturedImg.style.display = 'none';
  placeholder.style.display = 'flex';
  document.getElementById('result-card').classList.remove('visible');
  statusEl.textContent = '시작하기를 눌러주세요';
  document.getElementById('benchmark-result').innerHTML = '';
});

document.getElementById('invert-toggle').addEventListener('change', () => {
  if (lastCapturedCanvas) runInference(lastCapturedCanvas);
});

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

// 교재 방식 그대로 28x28 리사이즈 및 정규화
function preprocess(squareCanvas, invert) {
  const canvas = document.getElementById('canvas');
  canvas.width = 28; canvas.height = 28;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(squareCanvas, 0, 0, 28, 28);

  const data = ctx.getImageData(0, 0, 28, 28).data;
  const pixels = new Float32Array(28 * 28);
  for (let i = 0; i < 28 * 28; i++) {
    const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
    let gray = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    if (invert) gray = 1 - gray;
    pixels[i] = (gray - MEAN) / STD;
  }
  return pixels;
}

// CPU vs GPU 벤치마크가 적용된 추론 함수
async function runInference(squareCanvas) {
  statusEl.textContent = '벤치마크 측정 중... (GPU -> CPU)';
  document.getElementById('benchmark-result').innerHTML = ''; 
  
  if (!model) {
    statusEl.textContent = '모델이 아직 로드되지 않았어요.';
    return;
  }
  
  const invert = document.getElementById('invert-toggle').checked;
  const pixels = preprocess(squareCanvas, invert);
  const inputTensor = tf.tensor4d(pixels, [1, 28, 28, 1]);

  try {
    // --- [1] GPU (WebGL) 가속 연산 측정 ---
    await tf.setBackend('webgl'); 
    await tf.ready();             
    
    const startGpu = performance.now();
    const predGpu = model.predict(inputTensor);
    predGpu.dataSync(); // 연산 완료 대기 
    const endGpu = performance.now();
    const timeGpu = (endGpu - startGpu).toFixed(1);

    // --- [2] CPU 연산 측정 ---
    await tf.setBackend('cpu');   
    await tf.ready();
    
    const startCpu = performance.now();
    const predCpu = model.predict(inputTensor);
    const probs = predCpu.dataSync(); 
    const endCpu = performance.now();
    const timeCpu = (endCpu - startCpu).toFixed(1);

    // --- [3] 측정 결과 화면 출력 ---
    document.getElementById('benchmark-result').innerHTML = `
      <span style="color: #34C759;">⚡ GPU(WebGL): ${timeGpu}ms</span> | 
      <span style="color: #FF3B30;">🐢 CPU: ${timeCpu}ms</span>
    `;

    // 메모리 정리 및 백엔드 원상복구
    await tf.setBackend('webgl');
    inputTensor.dispose();
    predGpu.dispose();
    predCpu.dispose();

    // 결과 정렬 및 출력
    const ranked = Array.from(probs).map((p, i) => ({ digit: i, prob: p }))
                         .sort((a, b) => b.prob - a.prob);
    const top = ranked[0];

    statusEl.textContent = `추론 완료 · 확신도 ${(top.prob * 100).toFixed(1)}%`;
    showResult(ranked);

  } catch (error) {
    console.error("벤치마크 에러:", error);
    statusEl.textContent = "측정 중 오류가 발생했습니다.";
  }
}

function showResult(ranked) {
  const card = document.getElementById('result-card');
  card.classList.add('visible');

  const top = ranked[0];
  document.getElementById('result-digit').textContent = top.digit;
  document.getElementById('result-label').textContent =
    `예측: ${top.digit}번 · ${(top.prob * 100).toFixed(1)}% 확률`;

  const bars = document.getElementById('bars');
  bars.innerHTML = '';
  for (let i = 0; i <= 9; i++) {
    const item = ranked.find(r => r.digit === i);
    const pct = (item.prob * 100).toFixed(1);
    const isTop = (i === top.digit);
    bars.innerHTML += `
      <div class="bar-row">
        <span class="bar-digit">${i}</span>
        <div class="bar-bg">
          <div class="bar-fill ${isTop ? 'top' : ''}" style="width:${pct}%"></div>
        </div>
        <span class="bar-pct">${pct}%</span>
      </div>`;
  }
}
</script>
</body>
</html>
